repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-format
        name: ruff format (post-checkout to 2 spaces)
        args: ["--config", "indent-width = 2", "--config", "format.indent-style = 'space'", "."]
        pass_filenames: false
        always_run: true
        stages: [post-checkout]

