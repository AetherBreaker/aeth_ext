services:

  init:
    image: busybox
    restart: no
    volumes:
      - type: bind
        source: /data/imap_report_collector_files
        target: /app/persisted_data
    command: chown -R 999:999 /app/persisted_data
    user: root

  central-log-server:
    container_name: central-log-server
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        GIT_TAG: v4.2.6
        GIT_REPO: https://github.com/AetherBreaker/aeth_ext.git
    restart: on-failure:3
    expose:
      - 8080
    volumes:
      - type: bind
        source: /data/central_log_server_files
        target: /app/persisted_data
    environment:
      - ALERTS_EMAIL=info@sweetfiretobacco.com
      - ALERTS_EMAIL_PWD=${ALERTS_EMAIL_PWD:?}
      - ALERTS_RECIPIENTS=["jacob.ogden@sweetfiretobacco.com"]
    networks:
      coolify:
        aliases:
          - central-log-server
    labels:
      - "traefik.http.middlewares.logauth.basicauth.users=admin:$2a$05$9CWerMKGo26UptRyu.CMxOajlnkDwUrRe9frfdQhCYgh0Iy17/n6W"
    healthcheck:
      test:
        - CMD-SHELL
        - bash -ec '[ -f /app/persisted_data/logs/heartbeat.txt ] && ts=$$(cat /app/persisted_data/logs/heartbeat.txt 2>/dev/null) && [ -n "$$ts" ] && hb=$$(date -d "$$ts" +%s 2>/dev/null) && now=$$(date +%s) && [ $$((now - hb)) -lt 180 ]'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    user: nonroot:nonroot

networks:
  coolify:
    external: true
