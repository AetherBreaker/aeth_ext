[project]
  name            = "sft-ext"
  version         = "1.0.0"
  description     = "Add your description here"
  readme          = "README.md"
  requires-python = ">=3.14"
  authors         = [
    { name = "Jacob Ogden", email = "jacob.ogden@yahoo.com" },
  ]
  dependencies    = [
    "pydantic-settings>=2.14.1",
    "rich>=15.0.0",
    "tzdata>=2026.2",
  ]

  [project.optional-dependencies]
    async    = [
      "aiologic>=0.16.0",
      "uvloop>=0.22.1 ; sys_platform == 'linux'",
      "winloop>=0.6.0 ; sys_platform == 'win32'",
    ]
    dateutil = ["python-dateutil>=2.9.0.post0"]
    sftp     = ["paramiko>=5.0.0"]

[dependency-groups]
  dev = [
    "aiologic>=0.16.0",
    "paramiko>=5.0.0",
    "pyright>=1.1.409",
    "python-dateutil>=2.9.0.post0",
    "types-python-dateutil>=2.9.0.20260518",
    "uvloop>=0.22.1 ; sys_platform == 'linux'",
    "winloop>=0.6.0 ; sys_platform == 'win32'",
  ]

[build-system]
  requires      = [
    "uv_build>=0.11.2,<0.12.0",
  ]
  build-backend = "uv_build"

[tool.poe.tasks.bump]
  help        = "Bump version, commit, tag, and push. Usage: poe bump [major|minor|patch]"
  interpreter = "bash"
  shell       = """
    set -e
    NEW_VERSION=$(uv version --bump "${bump_type}" | awk '{print $NF}')
    git add pyproject.toml uv.lock
    git commit -m "Bump version to ${NEW_VERSION}"
    git tag -a "v${NEW_VERSION}" -m "Version ${NEW_VERSION}"
    git push --follow-tags
  """

  [[tool.poe.tasks.bump.args]]
    name       = "bump_type"
    positional = true
    help       = "Version component to bump: major, minor, or patch"

[tool.pyright]
  extends = "../pyproject.toml"

[tool.ruff]
  extend = "../pyproject.toml"

  src = [
    "./src",
  ]

  [tool.ruff.lint.flake8-type-checking]
    runtime-evaluated-base-classes = [
      "sft_ext.settings.BaseSettings",
      "sft_ext.types.__init__.EmailMessageParts",
      "sft_ext.types.__init__.AddressLike",
    ]
