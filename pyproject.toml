[project]
  authors = [
    { name = "Jacob Ogden", email = "jacob.ogden@yahoo.com" },
  ]
  dependencies = [
    "pydantic-settings>=2.14.1",
    "rich>=15.0.0",
    "tzdata>=2026.2",
  ]
  description = "Add your description here"
  name = "sft-ext"
  readme = "README.md"
  requires-python = ">=3.14"
  version = "0.4.0"

[build-system]
  build-backend = "uv_build"
  requires = [
    "uv_build>=0.11.2,<0.12.0",
  ]

[dependency-groups]
  dev = [
    "aiologic>=0.16.0",
    "paramiko>=5.0.0",
    "pyright>=1.1.409",
    "python-dateutil>=2.9.0.post0",
    "types-python-dateutil>=2.9.0.20260518",
    "uvloop>=0.22.1 ; sys_platform == 'linux'",
    "winloop>=0.6.0 ; sys_platform == 'win32'",
  ]


  [project.optional-dependencies]
    async = [
      "aiologic>=0.16.0",
      "uvloop>=0.22.1 ; sys_platform == 'linux'",
      "winloop>=0.6.0 ; sys_platform == 'win32'",
    ]
    dateutil = [
      "python-dateutil>=2.9.0.post0",
      "types-python-dateutil>=2.9.0.20260518",
    ]
    sftp = [
      "paramiko>=5.0.0",
    ]


[tool.ruff]
  extend = "../pyproject.toml"

  src = [
    "./src",
  ]
