[project]
  name            = "aeth-ext"
  version         = "2.0.1"
  description     = "Add your description here"
  readme          = "README.md"
  requires-python = ">=3.14"
  authors         = [
    { name = "Jacob Ogden", email = "jacob.ogden@yahoo.com" },
  ]
  dependencies    = [
    "aiologic>=0.16.0",
    "pydantic-settings>=2.14.1",
    "python-dateutil>=2.9.0.post0",
    "rich>=15.0.0",
    "tzdata>=2026.2",
  ]

  [project.optional-dependencies]
    async = [
      "uvloop>=0.22.1 ; sys_platform == 'linux'",
      "winloop>=0.6.0 ; sys_platform == 'win32'",
    ]
    sftp  = ["paramiko>=5.0.0"]

[dependency-groups]
  dev = [
    "paramiko>=5.0.0",
    "pyright>=1.1.409",
    "types-python-dateutil>=2.9.0.20260518",
    "uvloop>=0.22.1 ; sys_platform == 'linux'",
    "winloop>=0.6.0 ; sys_platform == 'win32'",
  ]

[build-system]
  requires      = [
    "uv_build>=0.11.2,<0.12.0",
  ]
  build-backend = "uv_build"

[tool.poe.tasks.release]
  help        = "Bump version, commit, tag, build, and publish to GitHub and SFTPyPI. Usage: poe release [major|minor|patch]"
  interpreter = "bash"
  envfile     = ".env"
  shell       = """
    set -e
    NEW_VERSION=$(uv version --bump "${bump_type}" | awk '{print $NF}')
    uv sync
    git add pyproject.toml uv.lock
    git commit -m "Bump version to ${NEW_VERSION}"
    git tag -a "v${NEW_VERSION}" -m "Version ${NEW_VERSION}"
    git push --follow-tags
    rm -f dist/*.whl dist/*.tar.gz
    uv build
    # Publish to devpi (SFTPyPI). Pass credentials explicitly — devpi does not
    # support OIDC/trusted publishing, so uv must receive them via CLI flags.
    # UV_PUBLISH_TOKEN is cleared so it cannot interfere.
    uv publish --index SFTPyPI \
      --username "${UV_INDEX_SFTPYPI_USERNAME}" \
      --password "${UV_INDEX_SFTPYPI_PASSWORD}"
    gh release create "v${NEW_VERSION}" dist/* --title "v${NEW_VERSION}" --generate-notes
  """

  [[tool.poe.tasks.release.args]]
    name       = "bump_type"
    positional = true
    help       = "Version component to bump: major, minor, or patch"

[tool.pyright]
  extends = "../pyproject.toml"

[tool.ruff]
  extend = "../pyproject.toml"

  src = ["./src"]

  [tool.ruff.lint.flake8-type-checking]
    runtime-evaluated-base-classes = [
      "aeth_ext.settings.BaseSettings",
      "aeth_ext.types.__init__.EmailMessageParts",
      "aeth_ext.types.__init__.AddressLike",
      "pydantic_settings.main.BaseSettings",
      "aeth_ext.types.AddressLike",
      "pydantic.main.BaseModel",
    ]

[[tool.uv.index]]
  name        = "SFTPyPI"
  url         = "https://pypi.sweetfiretobacco.com/jacob.ogden/internal/+simple"
  publish-url = "https://pypi.sweetfiretobacco.com/jacob.ogden/internal/"
